name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - alpha
      - beta
      - main
      - renovate/**
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  ci-optimization:
    name: CI optimization
    uses: dargmuesli/github-actions/.github/workflows/ci-optimization.yml@d8fbc998656a0a3476bfdb091c216c3cf78cdc94 # 5.1.1
    permissions:
      pull-requests: read
  build:
    needs: ci-optimization
    name: Build iOS (simulator)
    runs-on: macos-26 # TODO: change back to macos-latest once v26 is default (https://github.com/actions/runner-images/blob/main/README.md#available-images)

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Ruby
        uses: ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5 # v1.301.0

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods xcpretty

      - name: Build workspace on iOS Simulator
        run: |
          set -o pipefail
          xcodebuild -workspace vibetype.xcworkspace \
            -scheme vibetype \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -configuration Release \
            clean build | xcpretty
  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    name: Sign and release to TestFlight
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Ruby
        uses: ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5 # v1.301.0

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods

      - name: Archive app
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ISSUER_ID }}
          API_KEY_PRIVATE_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY_PRIVATE_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$API_KEY_PRIVATE_KEY" > "$RUNNER_TEMP/private_keys/AuthKey_${API_KEY_ID}.p8"
          xcodebuild -workspace vibetype.xcworkspace \
            -scheme vibetype \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/vibetype.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${API_KEY_ID}.p8" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_KEY_ISSUER_ID" \
            archive

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/vibetype.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${API_KEY_ID}.p8" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_KEY_ISSUER_ID"
